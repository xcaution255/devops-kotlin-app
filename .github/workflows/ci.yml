name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
            distribution: 'temurin'
            java-version: '21'

      - name: Grant execute permission for gradlew   #added to grant permission
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew build

      - name: Build Docker image with compose
        run: docker compose build   # This builds the services defined in your docker-compose.yml


